name: CI

on:
  pull_request:
    branches: [develop, main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # Use `npm install` here to avoid failing when lockfile and package.json
        # are out of sync in demo branches. For strict clean installs use `npm ci`.
        run: npm install

      - name: Run tests
        run: npm test
